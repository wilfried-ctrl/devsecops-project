name: DevSecOps Pipeline
 
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
 
jobs:
 
  # ─────────────────────────────────────────
  # JOB 1 : Lint des fichiers YAML
  # ─────────────────────────────────────────
  lint-yaml:
    name: YAML
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Install yamllint
        run: pip install yamllint
 
      - name: Run yamllint
        run: yamllint deployment.yaml
 
  # ─────────────────────────────────────────
  # JOB 2 : Build de l'image Docker
  # ─────────────────────────────────────────
  build:
    name:  Build Docker Image
    runs-on: ubuntu-latest
    needs: lint-yaml
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Build Docker image
        run: docker build -t flask-api:${{ github.sha }} .
 
      - name: Save Docker image as artifact
        run: docker save flask-api:${{ github.sha }} | gzip > flask-api.tar.gz
 
      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: flask-api.tar.gz
 
  # ─────────────────────────────────────────
  # JOB 3 : Scan Trivy des dépendances (FS)
  # ─────────────────────────────────────────
  trivy-fs-scan:
    name: Trivy — Scan dépendances
    runs-on: ubuntu-latest
    needs: lint-yaml
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '0'   # 0 = ne bloque pas le pipeline (pour la démo)
 
  # ─────────────────────────────────────────
  # JOB 4 : Scan Trivy de l'image Docker
  # ─────────────────────────────────────────
  trivy-image-scan:
    name:  Trivy — Scan image Docker
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
 
      - name: Load Docker image
        run: docker load < flask-api.tar.gz
 
      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          image-ref: 'flask-api:${{ github.sha }}'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
 
  # ─────────────────────────────────────────
  # JOB 5 : Conftest — Politique Kubernetes
  # ─────────────────────────────────────────
  conftest-policy:
    name: Conftest — Politique K8s
    runs-on: ubuntu-latest
    needs: lint-yaml
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Install Conftest
        run: |
          wget https://github.com/open-policy-agent/conftest/releases/download/v0.50.0/conftest_0.50.0_Linux_x86_64.tar.gz
          tar xzf conftest_0.50.0_Linux_x86_64.tar.gz
          sudo mv conftest /usr/local/bin/
          conftest --version
 
      - name: Run Conftest policy check
        run: conftest test deployment.yaml --policy policy/
        continue-on-error: true   # pour la démo, ne bloque pas
